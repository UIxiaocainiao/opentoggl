server {
    listen 8080;
    server_name _;

    # Custom CSS endpoint (no-cache to bypass PWA service worker)
    location = /custom.css {
        alias /usr/share/nginx/html/custom.css;
        add_header Content-Type text/css;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Proxy all other requests to OpenToggl
    location / {
        proxy_pass http://opentoggl:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;

        # Inject CSS as blocking <style>@import (takes priority over SPA styles)
        sub_filter_once on;
        sub_filter '</head>' '<style>@import url("/custom.css");</style></head>';
        sub_filter_types text/html;
    }
}
